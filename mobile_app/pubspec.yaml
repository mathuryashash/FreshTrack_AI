name: freshtrack_mobile
description: FreshTrack AI — Fruit freshness, quality grading & shelf-life prediction.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Camera & Image
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # Local database (prediction history)
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  percent_indicator: ^4.2.3
  cached_network_image: ^3.3.1

  # State & utils
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
